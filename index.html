<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>GlassTube AR</title>
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="ray-ban-display" content="true">
  <link rel="manifest" href="manifest.json">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    html, body {background:#0f0f0f!important;background-color:#0f0f0f!important}
    body{color:#f1f1f1;font-family:'Roboto',system-ui;margin:0;padding:0;min-height:100vh;overflow:hidden}

 .topbar{position:fixed;top:12%;left:50%;transform:translateX(-50%);width:88%;max-width:820px;z-index:10;display:flex;align-items:center;gap:8px;background:#0f0f0f;border:1px solid #272727;border-radius:24px;padding:8px 12px}
 .logo{width:28px;height:28px;background:#ff0000;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:700}
 .searchbox{flex:1;background:#121212;border:1px solid #303030;border-radius:16px;padding:8px 12px;font-size:14px;color:#f1f1f1;outline:none}
 .profile{width:32px;height:32px;background:#303030;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;overflow:hidden}
 .profile img{width:100%;height:100%;object-fit:cover}

    #feed{position:fixed;top:22%;left:50%;transform:translateX(-50%);width:88%;max-width:820px;z-index:10;display:grid;grid-template-columns:1fr 1fr;gap:12px;max-height:58vh;overflow-y:auto;padding-bottom:20px;-webkit-overflow-scrolling:touch;touch-action:pan-y;background:#0f0f0f!important}
    #feed::-webkit-scrollbar{width:0}
    #feed.hidden{display:none}

    #shortsFeed{position:fixed;top:0;left:0;right:0;bottom:0;z-index:15;display:none;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;touch-action:pan-y;background:#000}
    #shortsFeed.active{display:block}
    #shortsFeed::-webkit-scrollbar{width:0}
 .short-item{width:100%;height:100vh;scroll-snap-align:start;position:relative;display:flex;align-items:center;justify-content:center;background:#000}
 .short-item iframe{width:100%;height:100%;border:0;pointer-events:none}
 .short-overlay{position:absolute;bottom:80px;left:12px;right:80px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.8);pointer-events:none}
 .short-title{font-size:14px;font-weight:500;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
 .short-channel{font-size:12px;opacity:.9}
 .short-actions{position:absolute;right:12px;bottom:80px;display:flex;flex-direction:column;gap:20px}
 .short-btn{width:48px;height:48px;background:rgba(15,15,15,.6);backdrop-filter:blur(10px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;cursor:pointer}

 .vid-card{background:#0f0f0f;border:1px solid #272727;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform.15s}
 .vid-card:active{transform:scale(.97)}
 .vid-card.focused{outline:none;border-color:#3ea6ff;box-shadow:0 0 0 2px rgba(62,166,255,.5);transform:scale(1.02)}
 .thumb-wrap{width:100%;padding-top:56.25%;position:relative;overflow:hidden;background:#121212}
 .thumb{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
 .duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.8);color:#fff;font-size:11px;padding:2px 4px;border-radius:4px;font-weight:500}
 .vid-info{padding:10px;display:flex;gap:8px}
 .chan-avatar{width:32px;height:32px;background:#303030;border-radius:50%;flex-shrink:0}
 .vid-meta{flex:1;min-width:0}
 .vid-title{font-size:13px;font-weight:500;line-height:1.3;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:#f1f1f1}
 .vid-stats{font-size:11px;color:#aaa}

 .tabs{position:fixed;bottom:8%;left:50%;transform:translateX(-50%);display:flex;gap:0;z-index:10;background:#0f0f0f;border:1px solid #272727;border-radius:28px;padding:4px}
 .tabs.hidden{display:none}
 .tab{padding:8px 16px;border-radius:24px;color:#aaa;font-size:12px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:64px}
 .tab.active{background:#272727;color:#fff}
 .tab-icon{font-size:18px}

    #player{position:fixed;top:0;left:0;right:0;height:100vh;background:#000;z-index:100;opacity:0;pointer-events:none;transition:opacity.3s}
    #player.active{opacity:1;pointer-events:auto}
    #playerWrap{position:absolute;inset:0}
    #playerWrap iframe{width:100%;height:100%;border:0;display:block}
    #closePlayer{position:absolute;top:20px;right:20px;width:48px;height:48px;background:rgba(15,15,15,.7);border:1px solid #272727;border-radius:50%;color:#fff;font-size:26px;z-index:6;cursor:pointer;display:flex;align-items:center;justify-content:center}

 .msg{grid-column:span 2;text-align:center;padding:40px 20px;background:#0f0f0f;border:1px solid #272727;border-radius:12px;font-size:14px;color:#aaa}
 .spin{display:inline-block;animation:spin.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
 .rb-cursor{position:fixed;width:32px;height:32px;border:2px solid #3ea6ff;border-radius:50%;pointer-events:none;z-index:999;transition:transform.1s;box-shadow:0 0 12px rgba(62,166,255,.6);display:none}

    #authModal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:200;display:none;align-items:center;justify-content:center}
    #authModal.show{display:flex}
 .auth-box{background:#212121;border:1px solid #383838;border-radius:20px;padding:32px;max-width:320px;text-align:center}
 .auth-title{font-size:18px;font-weight:700;margin-bottom:12px;color:#f1f1f1}
 .auth-text{font-size:13px;color:#aaa;margin-bottom:20px;line-height:1.4}
 .auth-close{position:absolute;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,.1);border-radius:50%;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
 .key-indicator{position:fixed;top:8px;right:8px;background:#212121;border:1px solid #383838;border-radius:12px;padding:4px 8px;font-size:10px;color:#aaa;z-index:300}
  </style>
</head>
<body>

<div class="key-indicator" id="keyIndicator">Key 1/8</div>

<div class="topbar">
  <div class="logo">G</div>
  <input class="searchbox" id="searchInput" placeholder="Search">
  <div class="profile" id="profileBtn">👤</div>
</div>

<div id="feed"><div class="msg"><span class="spin">⟳</span> Loading…</div></div>
<div id="shortsFeed"></div>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="home"><div class="tab-icon">🏠</div>Home</div>
  <div class="tab" data-tab="shorts"><div class="tab-icon">▶️</div>Shorts</div>
  <div class="tab" data-tab="subs"><div class="tab-icon">📺</div>Subs</div>
  <div class="tab" data-tab="library"><div class="tab-icon">📚</div>Library</div>
</div>

<div id="player">
  <button id="closePlayer">×</button>
  <div id="playerWrap"></div>
</div>

<div id="authModal">
  <div class="auth-close" id="closeAuth">×</div>
  <div class="auth-box">
    <div class="auth-title">Sign in to YouTube</div>
    <div class="auth-text">Sign in to see your subscriptions and personalized feed</div>
    <div id="g_id_signin"></div>
  </div>
</div>

<div class="rb-cursor" id="rbCursor"></div>

<script>
// RAY-BAN META DISPLAY SDK
let rbDisplay = null;
if(window.RayBanDisplay) {
  rbDisplay = new RayBanDisplay({cursor:true,gesture:true,voice:true,haptic:true});
  rbDisplay.on('tap', e => {
    const el = document.elementFromPoint(e.x, e.y);
    if(el) el.click();
    rbDisplay.haptic(8);
  });
  rbDisplay.on('swipe', dir => {
    if(document.getElementById('shortsFeed').classList.contains('active')) {
      if(dir==='up') scrollShorts(-1);
      if(dir==='down') scrollShorts(1);
    } else {
      if(dir==='left') navigateCard(1);
      if(dir==='right') navigateCard(-1);
      if(dir==='up') document.getElementById('feed').scrollBy(0,-200);
      if(dir==='down') document.getElementById('feed').scrollBy(0,200);
    }
    rbDisplay.haptic(5);
  });
  rbDisplay.on('voice', text => {
    if(text.includes('search')) doSearch();
    if(text.includes('home')) loadTab('home');
    if(text.includes('shorts')) loadTab('shorts');
    if(text.includes('subscription')) loadTab('subs');
  });
  document.getElementById('rbCursor').style.display = 'block';
  rbDisplay.on('move', (x,y) => {
    const c = document.getElementById('rbCursor');
    c.style.left = x + 'px'; c.style.top = y + 'px';
  });
}

// API KEY POOL WITH AUTO-FALLBACK
const API_KEYS = [
  'AIzaSyCpw2u0mG3cYbH3PwAdjB7MOZB-1kdeRjo',
  'AIzaSyAOBBJC3VvRsAQC2R-nenGvO23x--9SzB0',
  'AIzaSyCxt2XsA80s67LNRTpgg-fBYqqHn2YgWDI',
  'AIzaSyDHjpWZX7J9-39VM9Urb8LM102nr1H91GY',
  'AIzaSyAivKVAqJkYqAkzX3lV1f8FiFlU-EchNYI',
  'AIzaSyBFVv1THj4Q0jJvNJv9jfyUnYz8NG4eWRk',
  'AIzaSyD4A2061bz3jVUjFg3Z8jsbgjiF7ii32h4',
  'AIzaSyA1AKHRCe7aq8Bv4j6KqXTjmg9hS1Fc9ho'
];
let currentKeyIndex = parseInt(localStorage.getItem('yt_key_idx')||'0');
const CLIENT_ID='YOUR_GOOGLE_OAUTH_CLIENT_ID.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/youtube.readonly';

function updateKeyIndicator() {
  document.getElementById('keyIndicator').textContent = `Key ${currentKeyIndex+1}/${API_KEYS.length}`;
}
updateKeyIndicator();

async function fetchWithKey(url, keyIndex = currentKeyIndex) {
  if(keyIndex >= API_KEYS.length) throw new Error('All API keys exhausted');
  const key = API_KEYS[keyIndex];
  const sep = url.includes('?')? '&' : '?';
  const fullUrl = url + sep + 'key=' + key;
  try {
    const res = await fetch(fullUrl);
    const data = await res.json();
    if(data.error) {
      if(data.error.code === 403 || data.error.errors?.[0]?.reason === 'quotaExceeded' || data.error.errors?.[0]?.reason === 'keyInvalid') {
        console.warn(`Key ${keyIndex+1} failed:`, data.error.message);
        currentKeyIndex = keyIndex + 1;
        localStorage.setItem('yt_key_idx', currentKeyIndex);
        updateKeyIndicator();
        return fetchWithKey(url, currentKeyIndex);
      }
      throw new Error(data.error.message);
    }
    currentKeyIndex = keyIndex;
    localStorage.setItem('yt_key_idx', currentKeyIndex);
    updateKeyIndicator();
    return data;
  } catch(e) {
    if(keyIndex + 1 < API_KEYS.length) {
      currentKeyIndex = keyIndex + 1;
      localStorage.setItem('yt_key_idx', currentKeyIndex);
      updateKeyIndicator();
      return fetchWithKey(url, currentKeyIndex);
    }
    throw e;
  }
}

let videos=[],shorts=[],focusedIndex=-1,currentTab='home',nextPageToken=null;
let accessToken=null,userProfile=null,loadingMore=false;
const feed=document.getElementById('feed');
const shortsFeed=document.getElementById('shortsFeed');
const playerEl=document.getElementById('player');
const playerWrap=document.getElementById('playerWrap');
const tabs=document.getElementById('tabs');
const authModal=document.getElementById('authModal');

function tap(el,fn){
  if(!el)return;
  var sx=0,sy=0,moved=false,didTouch=false;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;moved=false;didTouch=false;},{passive:true});
  el.addEventListener('touchmove',e=>{if(Math.abs(e.touches[0].clientX-sx)>10||Math.abs(e.touches[0].clientY-sy)>10)moved=true;},{passive:true});
  el.addEventListener('touchend',e=>{if(!moved){didTouch=true;fn(e);}});
  el.addEventListener('click',e=>{if(didTouch){didTouch=false;return;}fn(e);});
}

// OAUTH FLOW
window.onload = function() {
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleCredentialResponse,
    auto_select: false
  });
  google.accounts.id.renderButton(
    document.getElementById("g_id_signin"),
    {theme:"filled_black",size:"large",type:"standard",shape:"pill",text:"signin_with"}
  );
  accessToken = localStorage.getItem('yt_token');
  if(accessToken) validateToken();

  const params = new URLSearchParams(location.search);
  const shortsId = params.get('shorts');
  if(shortsId) {
    loadShortsSingle(shortsId);
  } else {
    loadTab('home');
  }
};

function handleCredentialResponse(response) {
  const tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (tokenResponse) => {
      accessToken = tokenResponse.access_token;
      localStorage.setItem('yt_token', accessToken);
      authModal.classList.remove('show');
      fetchUserProfile();
      if(currentTab==='subs') loadSubscriptions();
      if(currentTab==='home') loadHome();
    }
  });
  tokenClient.requestAccessToken();
}

function validateToken() {
  fetch(`https://www.googleapis.com/oauth2/v1/tokeninfo?access_token=${accessToken}`)
.then(r=>r.json()).then(d=>{
      if(d.error) {localStorage.removeItem('yt_token');accessToken=null;}
      else fetchUserProfile();
    });
}

function fetchUserProfile() {
  fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet&mine=true&access_token=${accessToken}`)
.then(r=>r.json()).then(d=>{
      if(d.items&&d.items[0]) {
        userProfile = d.items[0].snippet;
        document.getElementById('profileBtn').innerHTML = `<img src="${userProfile.thumbnails.default.url}">`;
      }
    });
}

tap(document.getElementById('profileBtn'),()=>{
  if(!accessToken) authModal.classList.add('show');
  else if(confirm('Sign out?')) {
    localStorage.removeItem('yt_token');
    accessToken=null;userProfile=null;
    document.getElementById('profileBtn').innerHTML='👤';
    if(currentTab==='subs'||currentTab==='home') loadTab('home');
  }
});
tap(document.getElementById('closeAuth'),()=>authModal.classList.remove('show'));

document.querySelectorAll('.tab').forEach(t=>{
  tap(t,()=>loadTab(t.dataset.tab));
});

// FIXED: search now uses keyboard
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('keydown', e=>{
  if(e.key==='Enter'){ doSearch(); searchInput.blur(); }
});

tap(document.getElementById('closePlayer'),()=>playerEl.classList.remove('active'));

feed.addEventListener('scroll',()=>{
  if(loadingMore||!nextPageToken)return;
  if(feed.scrollTop+feed.clientHeight>=feed.scrollHeight-200) loadMoreHome();
});

function loadTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  feed.classList.remove('hidden');
  shortsFeed.classList.remove('active');
  tabs.classList.remove('hidden');
  nextPageToken=null;

  if(tab==='home') {
    loadHome();
  } else if(tab==='shorts') {
    loadShorts();
  } else if(tab==='subs') {
    if(!accessToken) {
      authModal.classList.add('show');
      feed.innerHTML='<div class="msg">Sign in to see subscriptions</div>';
    } else {
      loadSubscriptions();
    }
  } else if(tab==='library') {
    loadHistory();
  }
}

async function loadHome() {
  feed.innerHTML='<div class="msg"><span class="spin">⟳</span> Loading…</div>';
  videos=[];
  if(accessToken) {
    try {
      const d = await fetch(`https://www.googleapis.com/youtube/v3/activities?part=snippet,contentDetails&home=true&maxResults=30&access_token=${accessToken}`).then(r=>r.json());
      if(!d.error&&d.items) {
        const ids = d.items.map(i=>i.contentDetails.upload?.videoId||i.contentDetails.playlistItem?.resourceId?.videoId).filter(Boolean);
        if(ids.length) {
          const v = await fetchWithKey(`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${ids.join(',')}`);
          videos=(v.items||[]).map(v=>({id:v.id,title:v.snippet.title,channel:v.snippet.channelTitle}));
          renderFeed();
          return;
        }
      }
    } catch(e) {console.warn('Home feed failed, falling back:',e);}
  }
  loadHomeTrending();
}

async function loadHomeTrending() {
  await fetchYT('videos?part=snippet&chart=mostPopular&maxResults=30');
}

async function fetchYT(ep,append=false) {
  if(loadingMore)return;
  loadingMore=true;
  try {
    const url = `https://www.googleapis.com/youtube/v3/${ep}&regionCode=US${nextPageToken?'&pageToken='+nextPageToken:''}`;
    const d = await fetchWithKey(url);
    const newVids=(d.items||[]).map(v=>({
      id:v.id.videoId||v.id,
      title:v.snippet.title,
      channel:v.snippet.channelTitle
    })).filter(v=>v.id);
    if(append) videos=videos.concat(newVids);
    else videos=newVids;
    nextPageToken=d.nextPageToken||null;
    loadingMore=false;
    renderFeed(append);
  } catch(e) {
    loadingMore=false;
    feed.innerHTML=`<div class="msg">Error: ${e.message}</div>`;
  }
}

function loadMoreHome() {
  if(currentTab==='home'&&nextPageToken) fetchYT('videos?part=snippet&chart=mostPopular&maxResults=30',true);
}

async function loadSubscriptions() {
  feed.innerHTML='<div class="msg"><span class="spin">⟳</span> Loading subscriptions…</div>';
  try {
    const d = await fetch(`https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=20&order=relevance&access_token=${accessToken}`).then(r=>r.json());
    const channelIds = (d.items||[]).map(i=>i.snippet.resourceId.channelId);
    if(!channelIds.length) {feed.innerHTML='<div class="msg">No subscriptions</div>';return;}
    const promises = channelIds.slice(0,5).map(cid=>
      fetchWithKey(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&order=date&channelId=${cid}&maxResults=6`)
    );
    const results = await Promise.all(promises);
    videos=[];
    results.forEach(d=>{
      (d.items||[]).forEach(v=>{
        if(v.id.videoId) videos.push({id:v.id.videoId,title:v.snippet.title,channel:v.snippet.channelTitle});
      });
    });
    videos.sort(()=>Math.random()-0.5);
    renderFeed();
  } catch(e) {
    feed.innerHTML=`<div class="msg">Error loading subs: ${e.message}</div>`;
  }
}

async function loadShorts() {
  feed.classList.add('hidden');
  shortsFeed.classList.add('active');
  tabs.classList.add('hidden');
  shortsFeed.innerHTML='<div class="msg"><span class="spin">⟳</span> Loading Shorts…</div>';
  try {
    const d = await fetchWithKey(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&order=date&maxResults=20&q=%23shorts`);
    shorts=(d.items||[]).map(v=>({
      id:v.id.videoId,
      title:v.snippet.title,
      channel:v.snippet.channelTitle
    }));
    renderShorts();
  } catch(e) {
    shortsFeed.innerHTML=`<div class="msg">Error: ${e.message}</div>`;
  }
}

async function loadShortsSingle(videoId) {
  feed.classList.add('hidden');
  shortsFeed.classList.add('active');
  tabs.classList.add('hidden');
  try {
    const d = await fetchWithKey(`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoId}`);
    const mainShort = d.items[0]?{id:d.items[0].id,title:d.items[0].snippet.title,channel:d.items[0].snippet.channelTitle}:null;
    const d2 = await fetchWithKey(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&order=date&maxResults=19&q=%23shorts`);
    shorts = mainShort?[mainShort]:[];
    shorts = shorts.concat((d2.items||[]).map(v=>({id:v.id.videoId,title:v.snippet.title,channel:v.snippet.channelTitle})));
    renderShorts();
  } catch(e) {
    shortsFeed.innerHTML=`<div class="msg">Error: ${e.message}</div>`;
  }
}

function renderShorts() {
  shortsFeed.innerHTML='';
  shorts.forEach((s,i)=>{
    const item=document.createElement('div');
    item.className='short-item';
    // FIXED: unmute and enable autoplay for swipe
    item.innerHTML=`
      <iframe src="https://www.youtube.com/embed/${s.id}?autoplay=1&mute=0&playsinline=1&controls=0&loop=1&playlist=${s.id}&enablejsapi=1" allow="autoplay; encrypted-media"></iframe>
      <div class="short-overlay">
        <div class="short-title">${s.title}</div>
        <div class="short-channel">@${s.channel}</div>
      </div>
      <div class="short-actions">
        <div class="short-btn">❤️</div>
        <div class="short-btn">💬</div>
        <div class="short-btn">↗️</div>
      </div>`;
    shortsFeed.appendChild(item);
  });
}

function scrollShorts(dir) {
  shortsFeed.scrollBy({top:dir*window.innerHeight,behavior:'smooth'});
  if(rbDisplay)rbDisplay.haptic(5);
}

function loadHistory(){
  const h=JSON.parse(localStorage.getItem('gt_history')||'[]');
  if(!h.length){feed.innerHTML='<div class="msg">No history yet</div>';return;}
  videos=h;renderFeed();
}

function renderFeed(append=false){
  if(!append) feed.innerHTML='';
  const startIdx = append?feed.children.length:0;
  videos.slice(startIdx).forEach((v,i)=>{
    const card=document.createElement('div');
    card.className='vid-card';
    card.innerHTML=`
      <div class="thumb-wrap">
        <img class="thumb" src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg" loading="lazy">
        <div class="duration">5:32</div>
      </div>
      <div class="vid-info">
        <div class="chan-avatar"></div>
        <div class="vid-meta">
          <div class="vid-title">${v.title}</div>
          <div class="vid-stats">${v.channel} · 1M views</div>
        </div>
      </div>`;
    tap(card,()=>openVideo(v));
    feed.appendChild(card);
  });
}

function openVideo(v){
  let h=JSON.parse(localStorage.getItem('gt_history')||'[]');
  h=h.filter(x=>x.id!==v.id);h.unshift(v);if(h.length>50)h.pop();
  localStorage.setItem('gt_history',JSON.stringify(h));
  playerEl.classList.add('active');
  playerWrap.innerHTML=`<iframe src="https://www.youtube.com/embed/${v.id}?autoplay=1&playsinline=1&rel=0" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
  if(rbDisplay)rbDisplay.haptic(12);
}

async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  feed.classList.remove('hidden');
  shortsFeed.classList.remove('active');
  tabs.classList.remove('hidden');
  feed.innerHTML='<div class="msg"><span class="spin">⟳</span> Searching…</div>';
  try {
    const d = await fetchWithKey(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&order=relevance&maxResults=30&q=${encodeURIComponent(q)}`);
    videos=(d.items||[]).map(v=>({id:v.id.videoId,title:v.snippet.title,channel:v.snippet.channelTitle}));
    nextPageToken=d.nextPageToken||null;
    renderFeed();
  } catch(e) {
    feed.innerHTML=`<div class="msg">Search error: ${e.message}</div>`;
  }
}

function navigateCard(dir){
  const cards=document.querySelectorAll('.vid-card');
  if(!cards.length)return;
  cards.forEach(c=>c.classList.remove('focused'));
  focusedIndex=Math.max(0,Math.min(cards.length-1,focusedIndex+dir));
  cards[focusedIndex].classList.add('focused');
  cards[focusedIndex].scrollIntoView({behavior:'smooth',block:'center'});
}
</script>
