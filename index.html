<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GlassTube AR</title>
  <meta name="theme-color" content="#0f0f0f">
  <script src="https://metaweareables.com/sdk/v1.2/meta-wearables.js"></script>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    *:focus{outline:4px solid #3ea6ff!important;outline-offset:3px!important}
    html,body{margin:0;padding:0;background:#0f0f0f;color:#f1f1f1;font-family:system-ui;height:100%;overflow:hidden}
    #debug{position:fixed;top:0;left:0;right:0;background:#ff9800;color:#000;padding:6px;text-align:center;font-size:12px;font-weight:600;z-index:10000}
    #topbar{width:100%;background:#0f0f0f;border-bottom:3px solid #272727;padding:16px;display:flex;align-items:center;gap:12px;margin-top:36px}
.logo{width:36px;height:36px;background:#f00;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;flex-shrink:0}
    #searchBtn{flex:1;background:#1a1a1a;border:4px solid #404040;border-radius:24px;padding:16px 20px;font-size:20px;color:#f1f1f1;text-align:left}
    #searchBtn:focus{border-color:#3ea6ff;background:#252525}
    #content{position:absolute;top:100px;left:0;right:0;bottom:80px;background:#000}
    #content iframe{width:100%;height:100%;border:0}
    #tabs{position:fixed;bottom:0;left:0;right:0;background:#0f0f0f;border-top:4px solid #272727;display:flex}
.tab{flex:1;padding:18px 8px;text-align:center;font-size:15px;color:#aaa;border:4px solid transparent;font-weight:600}
.tab:focus,.tab.active{color:#fff;background:#1a1a1a;border-color:#3ea6ff}
    #player{position:fixed;inset:0;background:#000;z-index:100;display:none}
    #player.active{display:flex;align-items:center;justify-content:center}
    #player iframe{width:100%;height:100%;border:0}
    #closePlayer{position:absolute;top:28px;right:28px;width:60px;height:60px;background:rgba(15,15,15,.95);border:4px solid #3ea6ff;border-radius:50%;color:#fff;font-size:36px;z-index:101}
.msg{text-align:center;padding:60px 20px;color:#aaa;font-size:18px;font-weight:600}
  </style>
</head>
<body>
<div id="debug">Initializing...</div>
<div id="topbar">
  <div class="logo">G</div>
  <button id="searchBtn" tabindex="0">Tap to search YouTube</button>
</div>
<div id="content">
  <div class="msg">Loading Ray-Ban SDK...</div>
</div>
<div id="tabs">
  <div class="tab active" data-idx="0" tabindex="0">🏠 Home</div>
  <div class="tab" data-idx="1" tabindex="0">📱 Shorts</div>
  <div class="tab" data-idx="2" tabindex="0">← Back</div>
</div>
<div id="player"><button id="closePlayer" tabindex="0">×</button><div id="playerWrap"></div></div>

<script>
let metaSDK = null, currentTab = 0, currentQuery = '';
const content = document.getElementById('content');
const searchBtn = document.getElementById('searchBtn');
const debug = document.getElementById('debug');
const player = document.getElementById('player');
const playerWrap = document.getElementById('playerWrap');

function setDebug(msg, ok = false) {
  debug.textContent = msg;
  debug.style.background = ok? '#4caf50' : '#ff9800';
  debug.style.color = ok? '#fff' : '#000';
}

async function initSDK() {
  if (typeof MetaWearables === 'undefined') {
    setDebug('ERROR: Open in Meta View App > Web Apps');
    content.innerHTML = '<div class="msg">❌ Not on Ray-Ban<br><br>1. Open Meta View app<br>2. Menu > Web Apps<br>3. Enter this URL</div>';
    return;
  }

  try {
    metaSDK = await MetaWearables.init({ appId: 'glasstube' });
    setDebug('Ray-Ban SDK Ready ✓', true);
    setTimeout(() => debug.style.display = 'none', 2000);

    metaSDK.input.on('dpad', (e) => handleDpad(e.value));
    metaSDK.input.on('button', (e) => {
      if (e.button === 'capture' && e.state === 'down') {
        document.activeElement?.click();
      }
    });

    loadHome();
    setTimeout(() => searchBtn.focus(), 500);

  } catch (err) {
    setDebug('SDK Error: ' + err.message);
  }
}

function handleDpad(dir) {
  const tabs = Array.from(document.querySelectorAll('.tab'));

  if (dir === 'left' && currentTab > 0) {
    currentTab--;
    tabs[currentTab].focus();
    switchTab(currentTab);
  } else if (dir === 'right' && currentTab < tabs.length - 1) {
    currentTab++;
    tabs[currentTab].focus();
    switchTab(currentTab);
  } else if (dir === 'up') {
    searchBtn.focus();
  } else if (dir === 'select') {
    if (document.activeElement === searchBtn) {
      openKeyboard();
    } else if (document.activeElement.classList.contains('tab')) {
      switchTab(parseInt(document.activeElement.dataset.idx));
    }
  }
}

function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', i === idx);
  });

  if (idx === 0) {
    loadHome();
  } else if (idx === 1) {
    loadShorts();
  } else if (idx === 2) {
    player.classList.remove('active');
    playerWrap.innerHTML = '';
    loadHome();
    currentTab = 0;
    document.querySelectorAll('.tab')[0].classList.add('active');
  }
}

async function openKeyboard() {
  if (!metaSDK?.input?.requestTextInput) return;
  try {
    setDebug('Opening Ray-Ban text input...', true);
    const result = await metaSDK.input.requestTextInput({
      prompt: 'Search YouTube',
      value: currentQuery,
      placeholder: 'Say or type search'
    });
    if (result?.text) {
      currentQuery = result.text;
      searchBtn.textContent = result.text;
      doSearch(result.text);
    }
  } catch (err) {
    setDebug('Input cancelled');
  }
}

searchBtn.addEventListener('click', openKeyboard);

// ===== LOAD m.youtube.com STYLE FEEDS =====
function loadHome() {
  setDebug('Loading YouTube Home...', true);
  // YouTube trending playlist mimics m.youtube.com home feed
  content.innerHTML = `<iframe src="https://www.youtube.com/embed?listType=playlist&list=PLFgquLnL59alCl_2TQvOiD5Vgm1hCaGSI&autoplay=0&rel=0&modestbranding=1&playsinline=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
}

function loadShorts() {
  setDebug('Loading Shorts...', true);
  // Direct Shorts player - same as m.youtube.com/shorts/tuKGo7FS6uU
  content.innerHTML = `<iframe src="https://www.youtube.com/embed/tuKGo7FS6uU?autoplay=1&playsinline=1&rel=0&modestbranding=1&loop=1&playlist=tuKGo7FS6uU" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
}

function doSearch(q) {
  setDebug('Searching: ' + q, true);
  // YouTube search results embed
  content.innerHTML = `<iframe src="https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(q)}&autoplay=0&rel=0&modestbranding=1&playsinline=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
}

document.getElementById('closePlayer').addEventListener('click', () => {
  player.classList.remove('active');
  playerWrap.innerHTML = '';
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(parseInt(tab.dataset.idx)));
});

if (location.protocol!== 'https:') {
  setDebug('ERROR: Must use HTTPS');
} else {
  window.addEventListener('load', initSDK);
}
</script>
</body>
</html>
