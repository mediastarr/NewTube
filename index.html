<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>GlassTube AR</title>
  <meta name="theme-color" content="#0f0f0f">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#0f0f0f;overflow:hidden}
    #ytFrame{width:100%;height:100%;border:0;position:fixed;top:0;left:0}
    #dpadOverlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;pointer-events:none}
    #dpadIndicator{position:fixed;bottom:20px;left:20px;background:#212121;border:1px solid #3ea6ff;border-radius:8px;padding:6px 10px;font-size:10px;color:#3ea6ff;z-index:10000;display:none}
    #dpadIndicator.show{display:block}
    #backBtn{position:fixed;top:20px;left:20px;width:48px;height:48px;background:rgba(15,15,15,.95);border:2px solid #3ea6ff;border-radius:50%;color:#fff;font-size:26px;z-index:10001;cursor:pointer;display:none;align-items:center;justify-content:center;pointer-events:auto}
    #backBtn.show{display:flex}
  </style>
</head>
<body>
<iframe id="ytFrame" src="https://m.youtube.com/?ra=m" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
<div id="dpadOverlay"></div>
<div id="dpadIndicator">D-Pad: Active</div>
<button id="backBtn">←</button>
<script>
const ytFrame = document.getElementById('ytFrame');
const backBtn = document.getElementById('backBtn');
const indicator = document.getElementById('dpadIndicator');
let currentView = 'home';
let history = ['https://m.youtube.com/?ra=m'];

function showDpad() {
  indicator.classList.add('show');
  setTimeout(()=>indicator.classList.remove('show'), 2000);
}

function navigate(url) {
  history.push(url);
  ytFrame.src = url;
  backBtn.classList.toggle('show', history.length > 1);
  if(url.includes('/shorts/')) currentView = 'shorts';
  else currentView = 'home';
}

// D-Pad controls - sends arrow keys to YouTube iframe
document.addEventListener('keydown', (e) => {
  showDpad();
  const key = e.key;
  
  // Try to send key events directly to iframe
  try {
    ytFrame.contentWindow.focus();
    const event = new KeyboardEvent('keydown', {
      key: key,
      code: e.code,
      keyCode: e.keyCode,
      which: e.which,
      bubbles: true
    });
    ytFrame.contentWindow.document.dispatchEvent(event);
  } catch(err) {
    console.log('Direct key injection blocked, using navigation fallback');
  }
  
  // Fallback navigation for Ray-Ban D-pad
  if(key === 'ArrowLeft') {
    e.preventDefault();
    if(history.length > 1) {
      history.pop();
      ytFrame.src = history[history.length - 1];
      backBtn.classList.toggle('show', history.length > 1);
    }
  } else if(key === 'ArrowRight') {
    e.preventDefault();
    // YouTube handles right arrow internally
  } else if(key === 'ArrowUp') {
    e.preventDefault();
    if(currentView === 'shorts') {
      ytFrame.contentWindow.postMessage('{"event":"command","func":"previousVideo","args":""}', '*');
    } else {
      ytFrame.contentWindow.scrollBy(0, -300);
    }
  } else if(key === 'ArrowDown') {
    e.preventDefault();
    if(currentView === 'shorts') {
      ytFrame.contentWindow.postMessage('{"event":"command","func":"nextVideo","args":""}', '*');
    } else {
      ytFrame.contentWindow.scrollBy(0, 300);
    }
  } else if(key === 'Enter') {
    e.preventDefault();
    // Simulate click at center of screen for YouTube
    const rect = ytFrame.getBoundingClientRect();
    const clickEvent = new MouseEvent('click', {
      view: ytFrame.contentWindow,
      bubbles: true,
      cancelable: true,
      clientX: rect.width / 2,
      clientY: rect.height / 2
    });
    try {
      ytFrame.contentWindow.document.elementFromPoint(rect.width/2, rect.height/2)?.click();
    } catch(err) {}
  }
});

backBtn.addEventListener('click', () => {
  if(history.length > 1) {
    history.pop();
    ytFrame.src = history[history.length - 1];
    backBtn.classList.toggle('show', history.length > 1);
  }
});

// Detect URL changes in iframe
setInterval(() => {
  try {
    const currentUrl = ytFrame.contentWindow.location.href;
    if(currentUrl.includes('/shorts/') && currentView !== 'shorts') {
      currentView = 'shorts';
    } else if(!currentUrl.includes('/shorts/') && currentView !== 'home') {
      currentView = 'home';
    }
  } catch(err) {
    // Cross-origin, can't read - that's fine
  }
}, 500);

// Initial focus
window.onload = () => {
  ytFrame.focus();
  showDpad();
};
</script>
</body>
</html>
