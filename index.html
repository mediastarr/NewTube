<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>GlassTube</title>
  <meta name="theme-color" content="transparent">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="ray-ban-display" content="true">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    /* RAY-BAN AR: No white panel */
    html, body, #feed {background:transparent!important;background-color:transparent!important}
    body{color:#0f0f0f;font-family:'Roboto',system-ui;margin:0;padding:0;min-height:100vh;overflow:hidden}
    @media (prefers-color-scheme: dark) {
      body{color:#fff}
    }

    /* TOP BAR - Like m.youtube.com */
   .topbar{position:fixed;top:12%;left:50%;transform:translateX(-50%);width:88%;max-width:820px;z-index:10;display:flex;align-items:center;gap:8px;background:rgba(20,20,20,.4);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:8px 12px;opacity:0.4}
   .logo{width:28px;height:28px;background:#ff0000;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:700}
   .searchbox{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:8px 12px;font-size:14px;color:inherit;outline:none}
   .profile{width:32px;height:32px;background:rgba(255,255,255,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}

    /* FEED - 2 column grid like m.youtube.com */
    #feed{position:fixed;top:22%;left:50%;transform:translateX(-50%);width:88%;max-width:820px;z-index:10;display:grid;grid-template-columns:1fr 1fr;gap:12px;max-height:58vh;overflow-y:auto;padding-bottom:20px;-webkit-overflow-scrolling:touch;touch-action:pan-y;background:transparent!important}
    #feed::-webkit-scrollbar{width:0}

    /* VIDEO CARD - YouTube mobile style */
   .vid-card{background:rgba(20,20,20,.4);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform.15s;opacity:0.4}
   .vid-card:active{transform:scale(.97)}
   .vid-card.focused{outline:none;border-color:#00d4ff;box-shadow:0 0 0 2px rgba(0,212,255,.5);transform:scale(1.02);opacity:0.6}
   .thumb-wrap{width:100%;padding-top:56.25%;position:relative;overflow:hidden;background:rgba(255,255,255,.06)}
   .thumb{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
   .duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.8);color:#fff;font-size:11px;padding:2px 4px;border-radius:4px;font-weight:500}
   .vid-info{padding:10px;display:flex;gap:8px}
   .chan-avatar{width:32px;height:32px;background:rgba(255,255,255,.1);border-radius:50%;flex-shrink:0}
   .vid-meta{flex:1;min-width:0}
   .vid-title{font-size:13px;font-weight:500;line-height:1.3;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
   .vid-stats{font-size:11px;color:rgba(255,255,255,.55)}

    /* BOTTOM TABS - Like m.youtube.com */
   .tabs{position:fixed;bottom:8%;left:50%;transform:translateX(-50%);display:flex;gap:0;z-index:10;background:rgba(20,20,20,.4);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:4px;opacity:0.4}
   .tab{padding:8px 16px;border-radius:24px;color:rgba(255,255,255,.7);font-size:12px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:64px}
   .tab.active{background:rgba(255,255,255,.1);color:#fff}
   .tab-icon{font-size:18px}

    /* PLAYER */
    #player{position:fixed;top:0;left:0;right:0;height:100vh;background:#000;z-index:100;opacity:0;pointer-events:none;transition:opacity.3s}
    #player.active{opacity:1;pointer-events:auto}
    #playerWrap{position:absolute;inset:0}
    #playerWrap iframe{width:100%;height:100%;border:0;display:block}
    #closePlayer{position:absolute;top:20px;right:20px;width:48px;height:48px;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.13);border-radius:50%;color:#fff;font-size:26px;z-index:6;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0.4}

   .msg{grid-column:span 2;text-align:center;padding:40px 20px;background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:12px;font-size:14px;color:rgba(255,255,255,.7);opacity:0.4}
   .spin{display:inline-block;animation:spin.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* RAY-BAN CURSOR */
   .rb-cursor{position:fixed;width:32px;height:32px;border:2px solid #00d4ff;border-radius:50%;pointer-events:none;z-index:999;transition:transform.1s;box-shadow:0 0 12px rgba(0,212,255,.6);display:none}
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">G</div>
  <input class="searchbox" id="searchInput" placeholder="Search" readonly>
  <div class="profile">👤</div>
</div>

<div id="feed"><div class="msg"><span class="spin">⟳</span> Loading…</div></div>

<div class="tabs">
  <div class="tab active" data-tab="home"><div class="tab-icon">🏠</div>Home</div>
  <div class="tab" data-tab="shorts"><div class="tab-icon">▶️</div>Shorts</div>
  <div class="tab" data-tab="subs"><div class="tab-icon">📺</div>Subs</div>
  <div class="tab" data-tab="library"><div class="tab-icon">📚</div>Library</div>
</div>

<div id="player">
  <button id="closePlayer">×</button>
  <div id="playerWrap"></div>
</div>

<div class="rb-cursor" id="rbCursor"></div>

<script>
// RAY-BAN META DISPLAY SDK
let rbDisplay = null;
if(window.RayBanDisplay) {
  rbDisplay = new RayBanDisplay({cursor:true,gesture:true,voice:true,haptic:true});
  rbDisplay.on('tap', e => {
    const el = document.elementFromPoint(e.x, e.y);
    if(el) el.click();
    rbDisplay.haptic(8);
  });
  rbDisplay.on('swipe', dir => {
    if(dir==='left') navigateCard(1);
    if(dir==='right') navigateCard(-1);
    if(dir==='up') document.getElementById('feed').scrollBy(0,-200);
    if(dir==='down') document.getElementById('feed').scrollBy(0,200);
    rbDisplay.haptic(5);
  });
  rbDisplay.on('voice', text => {
    if(text.includes('search')) document.getElementById('searchInput').focus();
    if(text.includes('home')) loadTab('home');
  });
  document.getElementById('rbCursor').style.display = 'block';
  rbDisplay.on('move', (x,y) => {
    const c = document.getElementById('rbCursor');
    c.style.left = x + 'px'; c.style.top = y + 'px';
  });
}

const KEY='AIzaSyCpw2u0mG3cYbH3PwAdjB7MOZB-1kdeRjo';
let videos=[],focusedIndex=-1,currentTab='home';
const feed=document.getElementById('feed');
const playerEl=document.getElementById('player');
const playerWrap=document.getElementById('playerWrap');

function tap(el,fn){
  if(!el)return;
  var sx=0,sy=0,moved=false,didTouch=false;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;moved=false;didTouch=false;},{passive:true});
  el.addEventListener('touchmove',e=>{if(Math.abs(e.touches[0].clientX-sx)>10||Math.abs(e.touches[0].clientY-sy)>10)moved=true;},{passive:true});
  el.addEventListener('touchend',e=>{if(!moved){e.preventDefault();didTouch=true;fn(e);}});
  el.addEventListener('click',e=>{if(didTouch){didTouch=false;return;}fn(e);});
}

document.querySelectorAll('.tab').forEach(t=>{
  tap(t,()=>loadTab(t.dataset.tab));
});
tap(document.getElementById('searchInput'),doSearch);
tap(document.getElementById('closePlayer'),()=>playerEl.classList.remove('active'));

function loadTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  let ep='';
  if(tab==='home') ep='videos?part=snippet&chart=mostPopular&maxResults=30';
  if(tab==='shorts') ep='search?part=snippet&type=video&videoDuration=short&order=date&maxResults=30&q=%23shorts';
  if(tab==='subs') ep='search?part=snippet&type=video&order=date&maxResults=30&q=subscription';
  if(tab==='library') return loadHistory();
  feed.innerHTML='<div class="msg"><span class="spin">⟳</span> Loading…</div>';
  fetch(`https://www.googleapis.com/youtube/v3/${ep}&key=${KEY}&regionCode=US`)
   .then(r=>r.json()).then(d=>{
      videos=(d.items||[]).map(v=>({
        id:v.id.videoId||v.id,
        title:v.snippet.title,
        channel:v.snippet.channelTitle
      })).filter(v=>v.id);
      renderFeed();
    });
}

function loadHistory(){
  const h=JSON.parse(localStorage.getItem('gt_history')||'[]');
  if(!h.length){feed.innerHTML='<div class="msg">No history yet</div>';return;}
  videos=h;renderFeed();
}

function renderFeed(){
  feed.innerHTML='';
  videos.forEach((v,i)=>{
    const card=document.createElement('div');
    card.className='vid-card';
    card.innerHTML=`
      <div class="thumb-wrap">
        <img class="thumb" src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg" loading="lazy">
        <div class="duration">5:32</div>
      </div>
      <div class="vid-info">
        <div class="chan-avatar"></div>
        <div class="vid-meta">
          <div class="vid-title">${v.title}</div>
          <div class="vid-stats">${v.channel} · 1M views</div>
        </div>
      </div>`;
    tap(card,()=>openVideo(v));
    feed.appendChild(card);
  });
}

function openVideo(v){
  let h=JSON.parse(localStorage.getItem('gt_history')||'[]');
  h=h.filter(x=>x.id!==v.id);h.unshift(v);if(h.length>50)h.pop();
  localStorage.setItem('gt_history',JSON.stringify(h));
  playerEl.classList.add('active');
  playerWrap.innerHTML=`<iframe src="https://www.youtube.com/embed/${v.id}?autoplay=1&playsinline=1&rel=0" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
  if(rbDisplay)rbDisplay.haptic(12);
}

function doSearch(){
  const q=prompt('Search:');
  if(!q)return;
  feed.innerHTML='<div class="msg"><span class="spin">⟳</span> Searching…</div>';
  fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&order=relevance&maxResults=30&q=${encodeURIComponent(q)}&key=${KEY}`)
   .then(r=>r.json()).then(d=>{
      videos=(d.items||[]).map(v=>({id:v.id.videoId,title:v.snippet.title,channel:v.snippet.channelTitle}));
      renderFeed();
    });
}

function navigateCard(dir){
  const cards=document.querySelectorAll('.vid-card');
  if(!cards.length)return;
  cards.forEach(c=>c.classList.remove('focused'));
  focusedIndex=Math.max(0,Math.min(cards.length-1,focusedIndex+dir));
  cards[focusedIndex].classList.add('focused');
  cards[focusedIndex].scrollIntoView({behavior:'smooth',block:'center'});
}

loadTab('home');
</script>
</body>
</html>
