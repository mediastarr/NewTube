<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GlassTube AR</title>
  <meta name="theme-color" content="#0f0f0f">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- Meta Wearables SDK -->
  <script src="https://metaweareables.com/sdk/v1.2/meta-wearables.js"></script>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    *:focus{outline:4px solid #3ea6ff!important;outline-offset:2px!important}
    html,body{margin:0;padding:0;background:#0f0f0f;color:#f1f1f1;font-family:system-ui;height:100%;overflow:hidden}
    #debug{position:fixed;top:0;left:0;right:0;background:#f44336;color:#fff;padding:4px;text-align:center;font-size:10px;z-index:10000;display:none}
    #debug.show{display:block}
    #topbar{width:100%;background:#0f0f0f;border-bottom:2px solid #272727;padding:14px;display:flex;align-items:center;gap:10px}
  .logo{width:32px;height:32px;background:#f00;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
    #searchInput{flex:1;background:#1a1a1a;border:3px solid #404040;border-radius:20px;padding:14px 18px;font-size:18px;color:#f1f1f1;outline:none}
    #searchInput:focus{border-color:#3ea6ff;background:#252525}
    #feed{position:absolute;top:80px;left:0;right:0;bottom:70px;overflow-y:auto;padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
    #feed::-webkit-scrollbar{display:none}
  .vid-card{background:#0f0f0f;border:3px solid #272727;border-radius:16px;overflow:hidden}
  .vid-card:focus{border-color:#3ea6ff;transform:scale(1.05);box-shadow:0 0 0 4px rgba(62,166,255,0.3)}
  .thumb-wrap{width:100%;padding-top:56.25%;position:relative;background:#1a1a1a}
  .thumb{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
  .duration{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.95);color:#fff;font-size:12px;padding:4px 8px;border-radius:6px;font-weight:600}
  .vid-info{padding:14px}
  .vid-title{font-size:15px;font-weight:600;line-height:1.3;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .vid-stats{font-size:13px;color:#aaa}
    #tabs{position:fixed;bottom:0;left:0;right:0;background:#0f0f0f;border-top:3px solid #272727;display:flex}
  .tab{flex:1;padding:16px 8px;text-align:center;font-size:14px;color:#aaa;border:3px solid transparent}
  .tab:focus,.tab.active{color:#fff;background:#1a1a1a;border-color:#3ea6ff}
    #player{position:fixed;inset:0;background:#000;z-index:100;display:none}
    #player.active{display:block}
    #player iframe{width:100%;height:100%;border:0}
    #closePlayer{position:absolute;top:24px;right:24px;width:56px;height:56px;background:rgba(15,15,15,.95);border:3px solid #3ea6ff;border-radius:50%;color:#fff;font-size:32px}
  .msg{grid-column:span 2;text-align:center;padding:50px 20px;background:#0f0f0f;border:3px solid #272727;border-radius:16px;color:#aaa;font-size:16px}
  </style>
</head>
<body>
<div id="debug"></div>
<div id="topbar">
  <div class="logo">G</div>
  <input id="searchInput" type="text" placeholder="Swipe down to search" autocomplete="off" tabindex="0">
</div>
<div id="feed" tabindex="0"><div class="msg">Waiting for SDK...</div></div>
<div id="tabs">
  <div class="tab active" data-idx="0" tabindex="0">🏠 Home</div>
  <div class="tab" data-idx="1" tabindex="0">🔍 Search</div>
  <div class="tab" data-idx="2" tabindex="0">← Back</div>
</div>
<div id="player"><button id="closePlayer" tabindex="0">×</button><div id="playerWrap"></div></div>

<script>
const API_KEYS = ['AIzaSyAOBBJC3VvRsAQC2R-nenGvO23x--9SzB0','AIzaSyCxt2XsA80s67LNRTpgg-fBYqqHn2YgWDI'];
let keyIdx = 0, videos = [], focusIdx = 0, focusArea = 'search';
const feed = document.getElementById('feed');
const searchInput = document.getElementById('searchInput');
const debug = document.getElementById('debug');
const player = document.getElementById('player');
const playerWrap = document.getElementById('playerWrap');

function log(msg) {
  debug.textContent = msg;
  debug.classList.add('show');
  setTimeout(() => debug.classList.remove('show'), 3000);
  console.log('[GlassTube]', msg);
}

// ===== META WEARABLES SDK - CORRECT EVENT NAMES =====
async function initSDK() {
  if (typeof MetaWearables === 'undefined') {
    log('ERROR: Not on Ray-Ban Meta. Must use Meta View app.');
    feed.innerHTML = '<div class="msg">Open this in Meta View app > Web Apps<br>Not in Chrome/Safari</div>';
    return;
  }

  try {
    const sdk = await MetaWearables.init({ appId: 'glasstube' });
    log('SDK Connected ✓');

    // RAY-BAN DISPLAY USES 'dpad' NOT 'touchpad'
    sdk.input.on('dpad', (e) => {
      log(`D-pad: ${e.value}`);
      handleDpad(e.value); // value: 'up','down','left','right','select'
    });

    // Capture button = select
    sdk.input.on('button', (e) => {
      if (e.button === 'capture' && e.state === 'down') {
        log('Capture pressed');
        handleSelect();
      }
    });

    // Force keyboard method
    window.metaSDK = sdk;
    loadHome();

  } catch (err) {
    log('SDK Init failed: ' + err.message);
  }
}

function handleDpad(dir) {
  const cards = Array.from(feed.querySelectorAll('.vid-card'));
  const cols = 2;

  if (focusArea === 'search') {
    if (dir === 'down' && cards[0]) {
      focusArea = 'feed';
      focusIdx = 0;
      cards[0].focus();
    } else if (dir === 'select') {
      openKeyboard();
    }
  } else if (focusArea === 'feed') {
    if (dir === 'up') {
      if (focusIdx < cols) {
        focusArea = 'search';
        searchInput.focus();
      } else {
        focusIdx -= cols;
        cards[focusIdx]?.focus();
      }
    } else if (dir === 'down') {
      if (focusIdx + cols < cards.length) {
        focusIdx += cols;
        cards[focusIdx]?.focus();
      } else {
        focusArea = 'tabs';
        focusIdx = 0;
        document.querySelectorAll('.tab')[0].focus();
      }
    } else if (dir === 'left' && focusIdx % cols > 0) {
      focusIdx--;
      cards[focusIdx]?.focus();
    } else if (dir === 'right' && focusIdx % cols < cols - 1 && cards[focusIdx + 1]) {
      focusIdx++;
      cards[focusIdx]?.focus();
    } else if (dir === 'select' && cards[focusIdx]) {
      openVideo(videos[focusIdx].id);
    }
  } else if (focusArea === 'tabs') {
    const tabs = Array.from(document.querySelectorAll('.tab'));
    if (dir === 'up') {
      focusArea = 'feed';
      focusIdx = Math.max(0, cards.length - cols);
      cards[focusIdx]?.focus();
    } else if (dir === 'left' && focusIdx > 0) {
      focusIdx--;
      tabs[focusIdx]?.focus();
    } else if (dir === 'right' && focusIdx < tabs.length - 1) {
      focusIdx++;
      tabs[focusIdx]?.focus();
    } else if (dir === 'select') {
      handleTab(parseInt(tabs[focusIdx].dataset.idx));
    }
  }
}

function handleSelect() {
  document.activeElement?.click();
}

function handleTab(idx) {
  if (idx === 0) {
    loadHome();
    focusArea = 'search';
    searchInput.focus();
  } else if (idx === 1) {
    focusArea = 'search';
    openKeyboard();
  } else if (idx === 2) {
    player.classList.remove('active');
    playerWrap.innerHTML = '';
  }
}

function openKeyboard() {
  searchInput.focus();
  if (window.metaSDK?.input?.showKeyboard) {
    window.metaSDK.input.showKeyboard();
    log('Keyboard requested');
  }
}

// Touch fallback for testing
searchInput.addEventListener('click', openKeyboard);
searchInput.addEventListener('keypress', e => {
  if (e.key === 'Enter') doSearch(e.target.value);
});

// ===== YOUTUBE API =====
async function fetchYT(endpoint) {
  const url = `https://www.googleapis.com/youtube/v3/${endpoint}&key=${API_KEYS[keyIdx]}`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data;
}

function formatViews(n) {
  n = parseInt(n || 0);
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M views';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'K views';
  return n + ' views';
}

function formatDuration(iso) {
  if (!iso) return '';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h = parseInt(m[1]||0), min = parseInt(m[2]||0), s = parseInt(m[3]||0);
  if (h) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${min}:${String(s).padStart(2,'0')}`;
}

async function loadHome() {
  feed.innerHTML = '<div class="msg">Loading...</div>';
  try {
    const data = await fetchYT('videos?part=snippet,contentDetails,statistics&chart=mostPopular&maxResults=20&regionCode=US');
    videos = data.items.map(v => ({
      id: v.id,
      title: v.snippet.title,
      channel: v.snippet.channelTitle,
      views: v.statistics?.viewCount,
      duration: v.contentDetails?.duration,
      thumb: v.snippet.thumbnails.medium.url
    }));
    renderFeed();
  } catch (err) {
    feed.innerHTML = `<div class="msg">Error: ${err.message}</div>`;
    log('API Error: ' + err.message);
  }
}

function renderFeed() {
  feed.innerHTML = '';
  videos.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'vid-card';
    card.tabIndex = 0;
    card.innerHTML = `
      <div class="thumb-wrap"><img class="thumb" src="${v.thumb}"><div class="duration">${formatDuration(v.duration)}</div></div>
      <div class="vid-info">
        <div class="vid-title">${v.title}</div>
        <div class="vid-stats">${v.channel} · ${formatViews(v.views)}</div>
      </div>`;
    card.addEventListener('click', () => openVideo(v.id));
    feed.appendChild(card);
  });
}

async function doSearch(q) {
  if (!q) return;
  feed.innerHTML = '<div class="msg">Searching...</div>';
  try {
    const searchData = await fetchYT(`search?part=snippet&type=video&maxResults=20&q=${encodeURIComponent(q)}`);
    const ids = searchData.items.map(v => v.id.videoId).join(',');
    const vidData = await fetchYT(`videos?part=snippet,contentDetails,statistics&id=${ids}`);
    videos = vidData.items.map(v => ({
      id: v.id,
      title: v.snippet.title,
      channel: v.snippet.channelTitle,
      views: v.statistics?.viewCount,
      duration: v.contentDetails?.duration,
      thumb: v.snippet.thumbnails.medium.url
    }));
    renderFeed();
    focusArea = 'feed';
    focusIdx = 0;
    setTimeout(() => feed.querySelector('.vid-card')?.focus(), 100);
  } catch (err) {
    feed.innerHTML = `<div class="msg">Search error: ${err.message}</div>`;
  }
}

function openVideo(id) {
  player.classList.add('active');
  playerWrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&playsinline=1" allow="autoplay"></iframe>`;
}

document.getElementById('closePlayer').addEventListener('click', () => {
  player.classList.remove('active');
  playerWrap.innerHTML = '';
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => handleTab(parseInt(tab.dataset.idx)));
});

// INIT
if (location.protocol!== 'https:' && location.hostname!== 'localhost') {
  log('ERROR: Must use HTTPS');
} else {
  window.addEventListener('load', initSDK);
}
</script>
</body>
</html>
