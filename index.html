<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>GlassTube AR</title>
  <meta name="theme-color" content="#0f0f0f">
  <!-- Meta Wearables Web App SDK - REQUIRED for Ray-Ban Display -->
  <script src="https://metaweareables.com/sdk/v1.2/meta-wearables.js"></script>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    *:focus{outline:3px solid #3ea6ff;outline-offset:2px}
    html,body{margin:0;padding:0;background:#0f0f0f;color:#f1f1f1;font-family:system-ui;height:100%;overflow:hidden}
    #statusBar{position:fixed;top:0;left:0;right:0;background:#212121;padding:8px;text-align:center;font-size:11px;z-index:9999}
    #topbar{width:100%;background:#0f0f0f;border-bottom:1px solid #272727;padding:12px;display:flex;align-items:center;gap:8px;margin-top:32px}
   .logo{width:28px;height:28px;background:#f00;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
    #searchInput{flex:1;background:#121212;border:2px solid #303030;border-radius:16px;padding:12px 16px;font-size:16px;color:#f1f1f1;outline:none;-webkit-user-select:text;user-select:text}
    #searchInput:focus{border-color:#3ea6ff;background:#1a1a1a}
    #feed{position:absolute;top:100px;left:0;right:0;bottom:60px;overflow-y:auto;padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px;-webkit-overflow-scrolling:touch}
    #feed::-webkit-scrollbar{display:none}
   .vid-card{background:#0f0f0f;border:2px solid #272727;border-radius:12px;overflow:hidden}
   .vid-card:focus{outline:3px solid #3ea6ff;border-color:#3ea6ff;transform:scale(1.02)}
   .thumb-wrap{width:100%;padding-top:56.25%;position:relative;background:#121212}
   .thumb{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
   .duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.9);color:#fff;font-size:11px;padding:3px 6px;border-radius:4px}
   .vid-info{padding:12px}
   .vid-title{font-size:14px;font-weight:500;line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
   .vid-stats{font-size:12px;color:#aaa}
    #tabs{position:fixed;bottom:0;left:0;right:0;background:#0f0f0f;border-top:2px solid #272727;display:flex;z-index:10}
   .tab{flex:1;padding:14px 8px;text-align:center;font-size:13px;color:#aaa;border:2px solid transparent}
   .tab:focus,.tab.active{color:#fff;background:#272727;border-color:#3ea6ff}
    #player{position:fixed;inset:0;background:#000;z-index:100;display:none}
    #player.active{display:block}
    #player iframe{width:100%;height:100%;border:0}
    #closePlayer{position:absolute;top:20px;right:20px;width:52px;height:52px;background:rgba(15,15,15,.9);border:2px solid #3ea6ff;border-radius:50%;color:#fff;font-size:28px;z-index:101}
   .msg{grid-column:span 2;text-align:center;padding:40px 20px;background:#0f0f0f;border:2px solid #272727;border-radius:12px;color:#aaa;font-size:14px}
  </style>
</head>
<body>
<div id="statusBar">Waiting for Meta Wearables SDK...</div>
<div id="topbar">
  <div class="logo">G</div>
  <input id="searchInput" type="text" placeholder="Tap to search YouTube" autocomplete="off" tabindex="0">
</div>
<div id="feed" tabindex="0"><div class="msg">Initializing...</div></div>
<div id="tabs">
  <div class="tab active" data-action="home" tabindex="0">🏠<br>Home</div>
  <div class="tab" data-action="search" tabindex="0">🔍<br>Search</div>
  <div class="tab" data-action="back" tabindex="0">←<br>Back</div>
</div>
<div id="player"><button id="closePlayer" tabindex="0">×</button><div id="playerWrap"></div></div>

<script>
const API_KEYS = ['AIzaSyAOBBJC3VvRsAQC2R-nenGvO23x--9SzB0','AIzaSyCxt2XsA80s67LNRTpgg-fBYqqHn2YgWDI','AIzaSyDHjpWZX7J9-39VM9Urb8LM102nr1H91GY'];
let keyIdx = 0;
let videos = [];
let focusIdx = 0;
let focusArea = 'search'; // search, feed, tabs

const feed = document.getElementById('feed');
const searchInput = document.getElementById('searchInput');
const statusBar = document.getElementById('statusBar');
const player = document.getElementById('player');
const playerWrap = document.getElementById('playerWrap');

// ===== META WEARABLES SDK INIT =====
let metaWearables = null;

async function initMetaSDK() {
  try {
    // Check if running on Ray-Ban Meta
    if (typeof MetaWearables === 'undefined') {
      statusBar.textContent = 'ERROR: Not running on Ray-Ban Meta. Deploy to HTTPS.';
      statusBar.style.background = '#f44336';
      return false;
    }

    // Initialize SDK
    metaWearables = await MetaWearables.init({
      appId: 'glasstube-ar',
      permissions: ['input', 'display']
    });

    statusBar.textContent = 'Meta Wearables SDK Connected ✓';
    statusBar.style.background = '#4caf50';
    setTimeout(() => statusBar.style.display = 'none', 2000);

    // Register touchpad input handler - THIS IS THE D-PAD
    metaWearables.input.on('touchpad', handleTouchpad);

    // Register capture button - acts as "Enter"
    metaWearables.input.on('button', (event) => {
      if (event.button === 'capture' && event.state === 'pressed') {
        handleEnter();
      }
    });

    return true;
  } catch (err) {
    statusBar.textContent = 'SDK Error: ' + err.message;
    statusBar.style.background = '#f44336';
    return false;
  }
}

// ===== D-PAD HANDLER FROM SDK =====
function handleTouchpad(event) {
  // event.direction: 'up', 'down', 'left', 'right', 'tap'
  const dir = event.direction;
  const cards = Array.from(feed.querySelectorAll('.vid-card'));
  const cols = 2;

  if (focusArea === 'search') {
    if (dir === 'down' && cards[0]) {
      focusArea = 'feed';
      focusIdx = 0;
      cards[0].focus();
    } else if (dir === 'tap') {
      openKeyboard();
    }
  } else if (focusArea === 'feed') {
    if (dir === 'up') {
      if (focusIdx < cols) {
        focusArea = 'search';
        searchInput.focus();
      } else {
        focusIdx -= cols;
        cards[focusIdx]?.focus();
      }
    } else if (dir === 'down') {
      if (focusIdx + cols < cards.length) {
        focusIdx += cols;
        cards[focusIdx]?.focus();
      } else {
        focusArea = 'tabs';
        focusIdx = 0;
        document.querySelectorAll('.tab')[0].focus();
      }
    } else if (dir === 'left' && focusIdx % cols > 0) {
      focusIdx--;
      cards[focusIdx]?.focus();
    } else if (dir === 'right' && focusIdx % cols < cols - 1 && cards[focusIdx + 1]) {
      focusIdx++;
      cards[focusIdx]?.focus();
    } else if (dir === 'tap' && cards[focusIdx]) {
      openVideo(videos[focusIdx].id);
    }
  } else if (focusArea === 'tabs') {
    const tabs = Array.from(document.querySelectorAll('.tab'));
    if (dir === 'up') {
      focusArea = 'feed';
      focusIdx = Math.max(0, cards.length - cols);
      cards[focusIdx]?.focus();
    } else if (dir === 'left' && focusIdx > 0) {
      focusIdx--;
      tabs[focusIdx]?.focus();
    } else if (dir === 'right' && focusIdx < tabs.length - 1) {
      focusIdx++;
      tabs[focusIdx]?.focus();
    } else if (dir === 'tap') {
      handleTabAction(tabs[focusIdx].dataset.action);
    }
  }
}

function handleEnter() {
  const activeEl = document.activeElement;
  if (activeEl === searchInput) {
    openKeyboard();
  } else if (activeEl.classList.contains('vid-card')) {
    activeEl.click();
  } else if (activeEl.classList.contains('tab')) {
    handleTabAction(activeEl.dataset.action);
  }
}

function handleTabAction(action) {
  if (action === 'home') {
    loadHome();
    focusArea = 'search';
    searchInput.focus();
  } else if (action === 'search') {
    focusArea = 'search';
    openKeyboard();
  } else if (action === 'back') {
    player.classList.remove('active');
    playerWrap.innerHTML = '';
  }
}

// ===== KEYBOARD FIX FOR RAY-BAN =====
function openKeyboard() {
  searchInput.focus();
  // Meta SDK method to explicitly show keyboard
  if (metaWearables && metaWearables.input.showKeyboard) {
    metaWearables.input.showKeyboard();
  }
  // Fallback: trigger input event
  searchInput.dispatchEvent(new Event('input', { bubbles: true }));
}

// Tap handler for touch
searchInput.addEventListener('touchstart', () => openKeyboard(), {passive: true});
searchInput.addEventListener('click', () => openKeyboard());
searchInput.addEventListener('keypress', e => {
  if (e.key === 'Enter') doSearch(e.target.value);
});

// ===== YOUTUBE API =====
async function fetchYT(endpoint) {
  for (let i = keyIdx; i < API_KEYS.length; i++) {
    try {
      const url = `https://www.googleapis.com/youtube/v3/${endpoint}&key=${API_KEYS[i]}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      keyIdx = i;
      return data;
    } catch (err) {
      if (i === API_KEYS.length - 1) throw err;
    }
  }
}

function formatViews(n) {
  if (!n) return '0 views';
  n = parseInt(n);
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M views';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'K views';
  return n + ' views';
}

function formatDuration(iso) {
  if (!iso) return '';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h = parseInt(m[1]||0), min = parseInt(m[2]||0), s = parseInt(m[3]||0);
  if (h) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${min}:${String(s).padStart(2,'0')}`;
}

async function loadHome() {
  feed.innerHTML = '<div class="msg">Loading trending videos...</div>';
  try {
    const data = await fetchYT('videos?part=snippet,contentDetails,statistics&chart=mostPopular&maxResults=20&regionCode=US');
    videos = data.items.map(v => ({
      id: v.id,
      title: v.snippet.title,
      channel: v.snippet.channelTitle,
      views: v.statistics?.viewCount,
      duration: v.contentDetails?.duration,
      thumb: v.snippet.thumbnails.medium.url
    }));
    renderFeed();
  } catch (err) {
    feed.innerHTML = `<div class="msg">Error: ${err.message}<br>Ensure HTTPS + valid API keys</div>`;
  }
}

function renderFeed() {
  feed.innerHTML = '';
  videos.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'vid-card';
    card.tabIndex = 0;
    card.innerHTML = `
      <div class="thumb-wrap"><img class="thumb" src="${v.thumb}"><div class="duration">${formatDuration(v.duration)}</div></div>
      <div class="vid-info">
        <div class="vid-title">${v.title}</div>
        <div class="vid-stats">${v.channel} · ${formatViews(v.views)}</div>
      </div>`;
    card.addEventListener('click', () => openVideo(v.id));
    feed.appendChild(card);
  });
}

async function doSearch(q) {
  if (!q) return;
  feed.innerHTML = '<div class="msg">Searching...</div>';
  try {
    const searchData = await fetchYT(`search?part=snippet&type=video&maxResults=20&q=${encodeURIComponent(q)}`);
    const ids = searchData.items.map(v => v.id.videoId).join(',');
    const vidData = await fetchYT(`videos?part=snippet,contentDetails,statistics&id=${ids}`);
    videos = vidData.items.map(v => ({
      id: v.id,
      title: v.snippet.title,
      channel: v.snippet.channelTitle,
      views: v.statistics?.viewCount,
      duration: v.contentDetails?.duration,
      thumb: v.snippet.thumbnails.medium.url
    }));
    renderFeed();
    focusArea = 'feed';
    focusIdx = 0;
    setTimeout(() => feed.querySelector('.vid-card')?.focus(), 100);
  } catch (err) {
    feed.innerHTML = `<div class="msg">Search error: ${err.message}</div>`;
  }
}

function openVideo(id) {
  player.classList.add('active');
  playerWrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&playsinline=1" allow="autoplay"></iframe>`;
}

document.getElementById('closePlayer').addEventListener('click', () => {
  player.classList.remove('active');
  playerWrap.innerHTML = '';
});

// ===== INIT =====
window.addEventListener('load', async () => {
  const sdkReady = await initMetaSDK();
  if (sdkReady) {
    loadHome();
    setTimeout(() => searchInput.focus(), 500);
  }
});

// Tab handlers
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => handleTabAction(tab.dataset.action));
});
</script>
</body>
</html>
