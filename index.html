<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>GlassTube AR</title>
  <meta name="theme-color" content="#0f0f0f">

  <meta name="ray-ban-display" content="true">

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html, body {background:#0f0f0f!important;margin:0;padding:0}
    body{color:#f1f1f1;font-family:'Roboto',system-ui;min-height:100vh}
.topbar{position:fixed;top:12%;left:50%;transform:translateX(-50%);width:88%;max-width:820px;z-index:10;display:flex;align-items:center;gap:8px;background:#0f0f0f;border:1px solid #272727;border-radius:24px;padding:8px 12px}
.logo{width:28px;height:28px;background:#ff0000;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:700}
.searchbox{flex:1;background:#121212;border:1px solid #303030;border-radius:16px;padding:8px 12px;font-size:14px;color:#f1f1f1;outline:none}
.profile{width:32px;height:32px;background:#303030;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;overflow:hidden;flex-shrink:0}
.profile img{width:100%;height:100%;object-fit:cover}
.ptr{position:absolute;top:-50px;left:50%;transform:translateX(-50%);width:40px;height:40px;background:#212121;border:1px solid #383838;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all.3s;opacity:0;z-index:5}
.ptr.active{top:10px;opacity:1}
.ptr.spinning{animation:spin 1s linear infinite}
    #feed{position:fixed;top:22%;left:50%;transform:translateX(-50%);width:88%;max-width:820px;z-index:5;display:grid;grid-template-columns:1fr 1fr;gap:12px;max-height:58vh;overflow-y:auto;padding-bottom:20px;-webkit-overflow-scrolling:touch;background:#0f0f0f!important}
    #feed::-webkit-scrollbar{width:0}
    #feed.hidden{display:none}
    #shortsFeed{position:fixed;top:0;left:0;right:0;bottom:0;z-index:15;display:none;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;background:#000}
    #shortsFeed.active{display:block}
    #shortsFeed::-webkit-scrollbar{width:0}
.short-item{width:100%;height:100vh;scroll-snap-align:start;position:relative;display:flex;align-items:center;justify-content:center;background:#000}
.short-item iframe{width:100%;height:100%;border:0;pointer-events:none}
.short-overlay{position:absolute;bottom:80px;left:12px;right:80px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.8);pointer-events:none;z-index:2}
.short-title{font-size:14px;font-weight:500;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.short-channel{font-size:12px;opacity:.9}
.short-actions{position:absolute;right:12px;bottom:80px;display:flex;flex-direction:column;gap:20px;z-index:3}
.short-btn{width:48px;height:48px;background:rgba(15,15,15,.6);backdrop-filter:blur(10px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;cursor:pointer}
.shorts-back{position:fixed;top:20px;left:20px;width:48px;height:48px;background:rgba(15,15,15,.9);border:1px solid #272727;border-radius:50%;color:#fff;font-size:26px;z-index:999;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:auto}
.mute-overlay{position:absolute;top:0;left:0;right:0;bottom:0;z-index:4;display:flex;align-items:center;justify-content:center;cursor:pointer}
.mute-indicator{width:80px;height:80px;background:rgba(0,0,0,.6);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:40px;color:#fff;pointer-events:none;opacity:0;transition:opacity.3s;gap:4px}
.mute-indicator span{font-size:12px}
.mute-indicator.show{opacity:1}
.vid-card{background:#0f0f0f;border:1px solid #272727;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform.15s}
.vid-card:active{transform:scale(.97)}
.thumb-wrap{width:100%;padding-top:56.25%;position:relative;overflow:hidden;background:#121212}
.thumb{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.8);color:#fff;font-size:11px;padding:2px 4px;border-radius:4px;font-weight:500}
.vid-info{padding:10px;display:flex;gap:8px}
.chan-avatar{width:32px;height:32px;background:#303030;border-radius:50%;flex-shrink:0;overflow:hidden}
.chan-avatar img{width:100%;height:100%;object-fit:cover}
.vid-meta{flex:1;min-width:0}
.vid-title{font-size:13px;font-weight:500;line-height:1.3;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:#f1f1f1}
.vid-stats{font-size:11px;color:#aaa}
.tabs{position:fixed;bottom:8%;left:50%;transform:translateX(-50%);display:flex;gap:0;z-index:10;background:#0f0f0f;border:1px solid #272727;border-radius:28px;padding:4px}
.tabs.hidden{display:none}
.tab{padding:8px 16px;border-radius:24px;color:#aaa;font-size:12px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:64px}
.tab.active{background:#272727;color:#fff}
.tab-icon{font-size:18px}
    #player{position:fixed;top:0;left:0;right:0;height:100vh;background:#000;z-index:100;opacity:0;pointer-events:none;transition:opacity.3s}
    #player.active{opacity:1;pointer-events:auto}
    #playerWrap{position:absolute;inset:0}
    #playerWrap iframe{width:100%;height:100%;border:0;display:block}
    #closePlayer{position:absolute;top:20px;right:20px;width:48px;height:48px;background:rgba(15,15,15,.7);border:1px solid #272727;border-radius:50%;color:#fff;font-size:26px;z-index:6;cursor:pointer;display:flex;align-items:center;justify-content:center}
.msg{grid-column:span 2;text-align:center;padding:40px 20px;background:#0f0f0f;border:1px solid #272727;border-radius:12px;font-size:14px;color:#aaa}
.spin{display:inline-block;animation:spin.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #authModal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:200;display:none;align-items:center;justify-content:center}
    #authModal.show{display:flex}
.auth-box{background:#212121;border:1px solid #383838;border-radius:20px;padding:32px;max-width:320px;text-align:center}
.auth-title{font-size:18px;font-weight:700;margin-bottom:12px;color:#f1f1f1}
.auth-text{font-size:13px;color:#aaa;margin-bottom:20px;line-height:1.4}
.auth-close{position:absolute;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,.1);border-radius:50%;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.key-indicator{position:fixed;top:8px;right:8px;background:#212121;border:1px solid #383838;border-radius:12px;padding:4px 8px;font-size:10px;color:#aaa;z-index:300}
  </style>
</head>
<body>
<div class="key-indicator" id="keyIndicator">Key 1/14</div>
<div class="topbar">
  <div class="logo">G</div>
  <input class="searchbox" id="searchInput" placeholder="Search" type="search" inputmode="search" autocapitalize="off" autocomplete="off">
  <div class="profile" id="profileBtn">👤</div>
</div>
<div id="feed">
  <div class="ptr" id="ptr"><span class="spin">⟳</span></div>

</div>
<div id="shortsFeed">

</div>
<div id="authModal">

  <div class="auth-box">
    <div class="auth-title">Sign in to YouTube</div>
    <div class="auth-text">Sign in to see your subscriptions and personalized feed</div>
    <div id="g_id_signin"></div>
  </div>
</div>
<script>
const API_KEYS = [

  'AIzaSyCxebesMswpVAubt4VhfpBP0IloB7B-6AE',
  'AIzaSyA52UFVj2C-GKlX5nluPKHsqZThiyCnN48',
  'AIzaSyC_5YNCC8nLEJzR-a_3jLCWB5Bt-ItjNds',
  'AIzaSyC7lIhVU022mls-kplFDctiLiKmz_gZuE8',
  'AIzaSyAXU8px5AsEy0EyaqXIHuNI54HhvPBNimc',
  'AIzaSyAgoLgY55op-mYbDA5CQdU0p4QUFhtlbgk'
];
let currentKeyIndex = parseInt(localStorage.getItem('yt_key_idx')||'0');
const CLIENT_ID='YOUR_GOOGLE_OAUTH_CLIENT_ID.apps.googleusercontent.com';
function updateKeyIndicator() {document.getElementById('keyIndicator').textContent = `Key ${currentKeyIndex+1}/${API_KEYS.length}`;}
updateKeyIndicator();
async function fetchWithKey(url, keyIndex = currentKeyIndex) {
  if(keyIndex >= API_KEYS.length) throw new Error('All 14 API keys exhausted');
  const key = API_KEYS[keyIndex];
  const sep = url.includes('?')? '&' : '?';
  const fullUrl = url + sep + 'key=' + key;
  try {
    const res = await fetch(fullUrl);
    const data = await res.json();
    if(data.error) {
      console.error(`Key ${keyIndex+1} failed:`, data.error.message);
      const reason = data.error.errors?.[0]?.reason;
      if(data.error.code === 403 || reason === 'quotaExceeded' || reason === 'keyInvalid') {
        currentKeyIndex = keyIndex + 1;
        localStorage.setItem('yt_key_idx', currentKeyIndex);
        updateKeyIndicator();
        return fetchWithKey(url, currentKeyIndex);
      }
      throw new Error(data.error.message);
    }
    currentKeyIndex = keyIndex;
    localStorage.setItem('yt_key_idx', currentKeyIndex);
    updateKeyIndicator();
    return data;
  } catch(e) {
    if(keyIndex + 1 < API_KEYS.length) {
      currentKeyIndex = keyIndex + 1;
      localStorage.setItem('yt_key_idx', currentKeyIndex);
      updateKeyIndicator();
      return fetchWithKey(url, currentKeyIndex);
    }
    throw e;
  }
}
function formatViews(n) {
  if(!n) return '0 views';
  n = parseInt(n);
  if(n >= 1e9) return (n/1e9).toFixed(1) + 'B views';
  if(n >= 1e6) return (n/1e6).toFixed(1) + 'M views';
  if(n >= 1e3) return (n/1e3).toFixed(0) + 'K views';
  return n + ' views';
}
function formatDuration(iso) {
  if(!iso) return '';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return '';
  const h = parseInt(m[1]||0), min = parseInt(m[2]||0), s = parseInt(m[3]||0);
  if(h) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${min}:${String(s).padStart(2,'0')}`;
}
function timeAgo(date) {
  const sec = Math.floor((Date.now() - new Date(date))/1000);
  const intervals = [[31536000,'year'],[2592000,'month'],[604800,'week'],[86400,'day'],[3600,'hour'],[60,'minute']];
  for(const [s,n] of intervals) {
    const i = Math.floor(sec/s);
    if(i>=1) return i + ' ' + n + (i>1?'s':'') + ' ago';
  }
  return 'just now';
}
let videos=[],shorts=[],currentTab='home',nextPageToken=null,accessToken=null,userProfile=null,loadingMore=false,shortsObserver=null;
const feed=document.getElementById('feed'),shortsFeed=document.getElementById('shortsFeed'),playerEl=document.getElementById('player'),playerWrap=document.getElementById('playerWrap'),tabs=document.getElementById('tabs'),authModal=document.getElementById('authModal'),ptr=document.getElementById('ptr');
function tap(el,fn){
  if(!el)return;
  var sx=0,sy=0,moved=false,didTouch=false;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;moved=false;didTouch=false;},{passive:true});
  el.addEventListener('touchmove',e=>{if(Math.abs(e.touches[0].clientX-sx)>10||Math.abs(e.touches[0].clientY-sy)>10)moved=true;},{passive:true});
  el.addEventListener('touchend',e=>{if(!moved){e.preventDefault();didTouch=true;fn(e);}});
  el.addEventListener('click',e=>{if(didTouch){didTouch=false;return;}fn(e);});
}
let ptrStartY = 0, ptrActive = false;
feed.addEventListener('touchstart', e => {if(feed.scrollTop === 0) {ptrStartY = e.touches[0].clientY;ptrActive = true;}});
feed.addEventListener('touchmove', e => {
  if(!ptrActive) return;
  const dy = e.touches[0].clientY - ptrStartY;
  if(dy > 0 && dy < 150) {
    ptr.style.top = Math.min(dy - 50, 10) + 'px';
    ptr.style.opacity = Math.min(dy/100, 1);
    if(dy > 100) ptr.classList.add('active');
  }
});
feed.addEventListener('touchend', e => {
  if(ptrActive && ptr.classList.contains('active')) {
    ptr.classList.add('spinning');
    loadHome();
    setTimeout(() => {ptr.classList.remove('active', 'spinning');ptr.style.top = '-50px';ptr.style.opacity = '0';}, 1000);
  } else {ptr.style.top = '-50px';ptr.style.opacity = '0';}
  ptrActive = false;
});
window.onload = function() {
  google.accounts.id.initialize({client_id: CLIENT_ID,callback: handleCredentialResponse,auto_select: false});
  google.accounts.id.renderButton(document.getElementById("g_id_signin"),{theme:"filled_black",size:"large",type:"standard",shape:"pill",text:"signin_with"});
  accessToken = localStorage.getItem('yt_token');
  if(accessToken) validateToken();
  loadTab('home');
};
function handleCredentialResponse(response) {
  const tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,scope: 'https://www.googleapis.com/auth/youtube.readonly',callback: (tokenResponse) => {
      accessToken = tokenResponse.access_token;
      localStorage.setItem('yt_token', accessToken);
      authModal.classList.remove('show');
      fetchUserProfile();
      if(currentTab==='subs') loadSubscriptions();
      if(currentTab==='home') loadHome();
    }
  });
  tokenClient.requestAccessToken();
}
function validateToken() {
  fetch(`https://www.googleapis.com/oauth2/v1/tokeninfo?access_token=${accessToken}`).then(r=>r.json()).then(d=>{
      if(d.error) {localStorage.removeItem('yt_token');accessToken=null;}
      else fetchUserProfile();
    });
}
function fetchUserProfile() {
  fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet&mine=true&access_token=${accessToken}`).then(r=>r.json()).then(d=>{
      if(d.items&&d.items[0]) {
        userProfile = d.items[0].snippet;
        document.getElementById('profileBtn').innerHTML = `<img src="${userProfile.thumbnails.default.url}">`;
      }
    });
}
tap(document.getElementById('profileBtn'),()=>{
  if(!accessToken) authModal.classList.add('show');
  else if(confirm('Sign out?')) {
    localStorage.removeItem('yt_token');
    accessToken=null;userProfile=null;
    document.getElementById('profileBtn').innerHTML='👤';
    if(currentTab==='subs'||currentTab==='home') loadTab('home');
  }
});
tap(document.getElementById('closeAuth'),()=>authModal.classList.remove('show'));
tap(document.getElementById('shortsBack'),()=>loadTab('home'));
document.querySelectorAll('.tab').forEach(t=>{tap(t,()=>loadTab(t.dataset.tab));});
document.getElementById('searchInput').addEventListener('keypress', e => {if(e.key === 'Enter') doSearch(e.target.value);});
document.getElementById('searchInput').addEventListener('focus', e => {e.target.select();});
tap(document.getElementById('closePlayer'),()=>playerEl.classList.remove('active'));
feed.addEventListener('scroll',()=>{
  if(loadingMore||!nextPageToken)return;
  if(feed.scrollTop+feed.clientHeight>=feed.scrollHeight-200) loadMoreHome();
});
function loadTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  feed.classList.remove('hidden');
  shortsFeed.classList.remove('active');
  tabs.classList.remove('hidden');
  nextPageToken=null;
  if(tab==='home') {loadHome();} else if(tab==='shorts') {loadShorts();} else if(tab==='subs') {
    if(!accessToken) {authModal.classList.add('show');feed.innerHTML='<div class="msg">Sign in to see subscriptions</div>';} else {loadSubscriptions();}
  } else if(tab==='library') {loadHistory();}
}
async function loadHome() {
  feed.innerHTML='<div class="ptr" id="ptr"><span class="spin">⟳</span></div><div class="msg"><span class="spin">⟳</span> Loading…</div>';
  videos=[];
  await fetchYT('videos?part=snippet,contentDetails,statistics&chart=mostPopular&maxResults=30');
}
async function fetchYT(ep,append=false) {
  if(loadingMore)return;
  loadingMore=true;
  try {
    const url = `https://www.googleapis.com/youtube/v3/${ep}&regionCode=US${nextPageToken?'&pageToken='+nextPageToken:''}`;
    const d = await fetchWithKey(url);
    const newVids=(d.items||[]).map(v=>({id:v.id.videoId||v.id,title:v.snippet.title,channel:v.snippet.channelTitle,channelId:v.snippet.channelId,views:v.statistics?.viewCount,duration:v.contentDetails?.duration,published:v.snippet.publishedAt})).filter(v=>v.id);
    if(append) videos=videos.concat(newVids); else videos=newVids;
    nextPageToken=d.nextPageToken||null;
    loadingMore=false;
    await addChannelAvatars();
    renderFeed(append);
  } catch(e) {
    loadingMore=false;
    feed.innerHTML=`<div class="msg">Error: ${e.message}</div>`;
    console.error('Fetch error:', e);
  }
}
async function addChannelAvatars() {
  const channelIds = [...new Set(videos.map(v=>v.channelId).filter(Boolean))];
  if(!channelIds.length) return;
  try {
    const d = await fetchWithKey(`https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${channelIds.join(',')}`);
    const avatarMap = {};
    (d.items||[]).forEach(c=>avatarMap[c.id] = c.snippet.thumbnails.default.url);
    videos.forEach(v=>v.channelAvatar = avatarMap[v.channelId]);
  } catch(e) {}
}
function loadMoreHome() {if(currentTab==='home'&&nextPageToken) fetchYT('videos?part=snippet,contentDetails,statistics&chart=mostPopular&maxResults=30',true);}
async function loadSubscriptions() {
  feed.innerHTML='<div class="msg"><span class="spin">⟳</span> Loading subscriptions…</div>';
  try {
    const d = await fetch(`https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=20&order=relevance&access_token=${accessToken}`).then(r=>r.json());
    const channelIds = (d.items||[]).map(i=>i.snippet.resourceId.channelId);
    if(!channelIds.length) {feed.innerHTML='<div class="msg">No subscriptions</div>';return;}
    const promises = channelIds.slice(0,5).map(cid=>fetchWithKey(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&order=date&channelId=${cid}&maxResults=6`));
    const results = await Promise.all(promises);
    const ids = [];
    results.forEach(d=>{(d.items||[]).forEach(v=>{if(v.id.videoId) ids.push(v.id.videoId);});});
    if(!ids.length) {feed.innerHTML='<div class="msg">No recent videos</div>';return;}
    const details = await fetchWithKey(`https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics&id=${ids.join(',')}`);
    videos=(details.items||[]).map(v=>({id:v.id,title:v.snippet.title,channel:v.snippet.channelTitle,channelId:v.snippet.channelId,views:v.statistics.viewCount,duration:v.contentDetails.duration,published:v.snippet.publishedAt}));
    videos.sort(()=>Math.random()-0.5);
    await addChannelAvatars();
    renderFeed();
  } catch(e) {feed.innerHTML=`<div class="msg">Error loading subs: ${e.message}</div>`;}
}
async function loadShorts() {
  feed.classList.add('hidden');
  shortsFeed.classList.add('active');
  tabs.classList.add('hidden');
  shortsFeed.innerHTML='<div class="shorts-back" id="shortsBack">×</div><div class="msg"><span class="spin">⟳</span> Loading Shorts…</div>';
  tap(document.getElementById('shortsBack'),()=>loadTab('home'));
  try {
    const d = await fetchWithKey(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&order=date&maxResults=20&q=%23shorts`);
    shorts=(d.items||[]).map(v=>({id:v.id.videoId,title:v.snippet.title,channel:v.snippet.channelTitle}));
    renderShorts();
  } catch(e) {shortsFeed.innerHTML=`<div class="shorts-back" id="shortsBack">×</div><div class="msg">Error: ${e.message}</div>`;}
}
function renderShorts() {
  shortsFeed.innerHTML='<div class="shorts-back" id="shortsBack">×</div>';
  tap(document.getElementById('shortsBack'),()=>loadTab('home'));
  if(shortsObserver) shortsObserver.disconnect();
  shortsObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const iframe = entry.target.querySelector('iframe');
      if(iframe && iframe.contentWindow) {
        if(entry.isIntersecting) {
          iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        } else {
          iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
        }
      }
    });
  }, {threshold: 0.6});
  shorts.forEach((s,i)=>{
    const item=document.createElement('div');
    item.className='short-item';
    item.dataset.index=i;
    item.innerHTML=`<iframe id="short_${i}" src="https://www.youtube.com/embed/${s.id}?enablejsapi=1&playsinline=1&controls=0&loop=1&playlist=${s.id}" allow="autoplay"></iframe><div class="mute-overlay" data-index="${i}"><div class="mute-indicator" id="mute_${i}">🔇<span>Tap to unmute</span></div></div><div class="short-overlay"><div class="short-title">${s.title}</div><div class="short-channel">@${s.channel}</div></div><div class="short-actions"><div class="short-btn">❤️</div><div class="short-btn">💬</div><div class="short-btn">↗️</div></div>`;
    shortsFeed.appendChild(item);
    const overlay = item.querySelector('.mute-overlay');
    tap(overlay,()=>toggleMute(i));
    shortsObserver.observe(item);
  });
  setTimeout(()=>{const firstMute = document.getElementById('mute_0');if(firstMute) {firstMute.classList.add('show');setTimeout(()=>firstMute.classList.remove('show'),2000);}},500);
}
function toggleMute(index) {
  const iframe = document.getElementById(`short_${index}`);
  const mute = document.getElementById(`mute_${index}`);
  if(iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
    iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
    if(mute) {
      mute.innerHTML='🔊<span>Unmuted</span>';
      mute.classList.add('show');
      setTimeout(()=>mute.classList.remove('show'),1000);
    }
  }
}
function loadHistory(){
  const h=JSON.parse(localStorage.getItem('gt_history')||'[]');
  if(!h.length){feed.innerHTML='<div class="msg">No history yet</div>';return;}
  videos=h;renderFeed();
}
function renderFeed(append=false){
  if(!append) feed.innerHTML='<div class="ptr" id="ptr"><span class="spin">⟳</span></div>';
  const startIdx = append?feed.children.length-1:0;
  videos.slice(startIdx).forEach((v,i)=>{
    const card=document.createElement('div');
    card.className='vid-card';
    card.innerHTML=`<div class="thumb-wrap"><img class="thumb" src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg" loading="lazy"><div class="duration">${formatDuration(v.duration)}</div></div><div class="vid-info"><div class="chan-avatar">${v.channelAvatar?`<img src="${v.channelAvatar}">`:''}</div><div class="vid-meta"><div class="vid-title">${v.title}</div><div class="vid-stats">${v.channel} · ${formatViews(v.views)} · ${timeAgo(v.published)}</div></div></div>`;
    tap(card,()=>openVideo(v));
    feed.appendChild(card);
  });
}
function openVideo(v){
  let h=JSON.parse(localStorage.getItem('gt_history')||'[]');
  h=h.filter(x=>x.id!==v.id);h.unshift(v);if(h.length>50)h.pop();
  localStorage.setItem('gt_history',JSON.stringify(h));
  playerEl.classList.add('active');
  playerWrap.innerHTML=`<iframe src="https://www.youtube.com/embed/${v.id}?autoplay=1&playsinline=1&rel=0" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
}
async function doSearch(q){
  if(!q)return;
  feed.classList.remove('hidden');
  shortsFeed.classList.remove('active');
  tabs.classList.remove('hidden');
  feed.innerHTML='<div class="msg"><span class="spin">⟳</span> Searching…</div>';
  try {
    const d = await fetchWithKey(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&q=${encodeURIComponent(q)}&maxResults=30`);
    const ids = (d.items||[]).map(v=>v.id.videoId).filter(Boolean);
    if(!ids.length) {feed.innerHTML='<div class="msg">No results</div>';return;}
    const details = await fetchWithKey(`https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics&id=${ids.join(',')}`);
    videos=(details.items||[]).map(v=>({id:v.id,title:v.snippet.title,channel:v.snippet.channelTitle,channelId:v.snippet.channelId,views:v.statistics.viewCount,duration:v.contentDetails.duration,published:v.snippet.publishedAt}));
    await addChannelAvatars();
    renderFeed();
  } catch(e) {feed.innerHTML=`<div class="msg">Search error: ${e.message}</div>`;}
}
</script>
</body>
</html>
